allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

rootProject.layout.buildDirectory = new File(rootProject.rootDir, '../build')

subprojects {
    project.layout.buildDirectory = new File(rootProject.layout.buildDirectory.asFile.get(), project.name)
}

subprojects {
    project.evaluationDependsOn(':app')
}

tasks.register("clean", Delete) {
    delete rootProject.layout.buildDirectory
}
